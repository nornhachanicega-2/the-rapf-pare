        body {

            background-color:rgb(26, 11, 75);

        }
        .top-bar {
            background-color:#E6A8D7;
            width: 100%;
            color:rgb(14, 45, 109);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }
        .top-bar a {
            color: #f9ff50;
            text-decoration: none;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;

        }

        }

            display: flex;
            gap: 20px;
            margin: 0;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            text-decoration: none;
            font-weight: bold;
            color: #E6A8D7;
        }

        .logo, .search-bar{
            display: flex;
            flex-direction: row;
        }
        .logo{

            justify-content: center;

        }
        .top-bar, .logo{
            padding-bottom: 0;
        }
        .top-bar p{
            color: rgb(26, 11, 75);

            padding-bottom: 0;

        header {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 120px;
            margin: 0 ;
            padding: 0;
            flex-wrap: wrap;
            width: 100%;
        }

        }

            text-decoration: none;
            font-size: 1.2rem;
        }

        .profile-icon img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .pin {
            overflow: hidden;
            border-radius: 15px;
        }

        .pin img {
            width: 100%;
            height:100%;
            border-radius: 15px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .pin img:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .search-bar {
                width: 80%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background-color: #1a0a41;
                text-align: center;
                padding: 10px 0;
                flex-wrap: wrap;
            }
            nav a {
                display: block;
                padding: 10px;
            }
            .top-bar{
                flex-wrap: wrap;
            }
            .image-gallery {
                grid-template-columns: repeat(4, 1fr); 
            }
            
            nav ul {
                flex-direction: column;
                align-items: center;
            }
            .top-bar {
                font-size: 14px;
                padding: 8px;
                text-align: center;
            }
            
            nav ul {
                display: flex;
                flex-direction: column; 
                justify-content: center;
                align-items: center;
                gap: 10px;
            }
            
            .logo {
                text-align: center;
                margin-bottom: 10px;
            }

                max-width: 120px;

            nav, .logo{

                flex-direction:row ;
                justify-content: center;
                align-items: center;
            }

                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            }
        }

                text-align: center;
                gap: 10px;
            }

            .image-gallery {

        }

        @media screen and (max-width: 1024px) {

                display: none;
            }
        }
