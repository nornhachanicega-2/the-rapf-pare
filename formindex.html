<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-In Form</title>
    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #1a0e49;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            background-color: #E6A8D7;
            width: 100%;
            color: rgb(14, 45, 109);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            padding: 10px 0;
        }
        .top-bar a {
            color: #f9ff50;
            text-decoration: none;
            font-weight: bold;
        }
        .top-bar p {
            color: rgb(26, 11, 75);
            margin: 0;
        }

        /* ========== HEADER & NAVIGATION ========== */
        header {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 120px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;          /* was 200px – fixed */
            font-weight: 700;
            color: #E6A8D7;
            padding-right: 0;
            padding-bottom: 0;
        }
        .logo img {
            max-width: 150px;
            height: auto;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(26, 11, 75);
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            text-decoration: none;
            font-weight: bold;
            color: #E6A8D7;
            font-size: 1.2rem;
        }
        nav ul li a:hover {
            color: #00ffee;
        }

        /* ========== ACCORDION (MOBILE) ========== */
        #accordion {
            display: none;
        }
        .accordion-button {
            width: 100%;
            background-color: rgb(26, 11, 75);
            border: none;
            cursor: pointer;
            text-align: left;
        }
        .accordion-content {
            display: none;
            background-color: rgb(26, 11, 75);
            padding: 10px;
            margin-top: 5px;
        }
        .accordion-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .accordion-content li a {
            text-decoration: none;
            color: #E6A8D7;
            display: block;
            padding: 5px 0;
        }

        /* ========== FORM CONTAINER ========== */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 10px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
        }

        .forgot-password {
            color: #1a0e49;
            text-decoration: none;
        }

        .required {
            color: red;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            background-color: rgb(26, 11, 75);
            color: white;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #091a2a;
        }

        /* ========== MEDIA QUERIES ========== */
        @media (max-width: 1024px) {
            #accordion {
                display: none;
            }
        }

        @media (max-width: 920px) {
            nav ul {
                display: flex;
                flex-direction: row;
            }
        }

        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                align-items: center;
                display: flex;
                gap: 10px;
                text-align: center;
            }
            .top-bar {
                font-size: 14px;
                padding: 8px;
                text-align: center;
            }
            .logo {
                text-align: center;
                margin-bottom: 10px;
                padding-right: 0;
                font-size: 24px;
            }
            .logo img {
                max-width: 120px;
            }
            nav, .logo {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }
            nav ul {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }

        @media (max-width: 767px) {
            #accordion {
                display: flex;
                flex-direction: column;
            }
            nav ul {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .top-bar {
                font-size: 14px;
            }
            nav ul {
                display: none;
                flex-direction: column;
                text-align: center;
            }
        }

        @media (min-width: 768px) {
            #accordion {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <p>Download The Rapf pare App: <a href="#">Explore Now</a></p>
    </div>
    <header>
        <div class="header">
            <div class="logo"><img src='images/womenog/logo.png' alt='logo' width="150px"></div>
        </div>
        <nav>
            <ul>
                <li><a href="menindex.html">MEN</a></li>
                <li><a href="womenindex.html">WOMEN</a></li>               
                <li><a href="homeindex.html">HOME</a></li>
                <li><a href="formindex.html">CONTACT US</a></li>
                <li><a href="index.html">MAIN</a></li>
            </ul>
        </nav>
        <div id="accordion">
            <button class="accordion-button" onclick="toggleAccordion()">
                <img src='images/list-ul-alt-svgrepo-com.svg' width="50px" alt="menu">
            </button>
            <div class="accordion-content" id="accordionContent">
                <ul>
                    <li><a href="menindex.html">MEN</a></li>
                    <li><a href="womenindex.html">WOMEN</a></li>               
                    <li><a href="homeindex.html">HOME</a></li>
                    <li><a href="formindex.html">CONTACT US</a></li>
                    <li><a href="index.html">MAIN</a></li>
                </ul>
            </div>
        </div>
    </header>  

    <div class="form-container">
        <div class="login-box">
            <h2>Sign in</h2>
            <form>
                <label for="email">*EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                
                <label for="password">*PASSWORD</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                
                <div class="options">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                    <span class="required">*Required</span>
                </div>

                <button type="submit">SIGN IN</button>
            </form>
        </div>
    </div>

    <script>
        function toggleAccordion() {
            var content = document.getElementById("accordionContent");
            if (content.style.display === "block") {
                content.style.display = "none"; 
            } else {
                content.style.display = "block"; 
            }
        }
    </script>
</body>
</html>
